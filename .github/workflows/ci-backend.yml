name: ci-backend

on:
  pull_request:
    paths:
      - 'src/backend/**'
      - '.github/workflows/ci-backend.yml'
  push:
    branches: ["main", "work"]
    paths:
      - 'src/backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  build-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore src/backend/KaizenWellness.sln
      - name: Build
        run: dotnet build src/backend/KaizenWellness.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test src/backend/KaizenWellness.sln --configuration Release --no-build
