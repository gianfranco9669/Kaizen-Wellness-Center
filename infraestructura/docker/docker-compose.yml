version: '3.9'
services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    ports:
      - '6379:6379'

  api:
    build:
      context: ../../
      dockerfile: infraestructura/docker/Dockerfile.api
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ClaveSecreta: ${JWT_CLAVE_SECRETA}
      Qr__ClaveSecreta: ${QR_CLAVE_SECRETA}
      Cors__OrigenesPermitidos__0: ${CORS_ORIGEN}
    ports:
      - '8080:8080'
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../../
      dockerfile: infraestructura/docker/Dockerfile.frontend
    env_file:
      - .env
    ports:
      - '4200:80'
    depends_on:
      - api

volumes:
  postgres_data:
